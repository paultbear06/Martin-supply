            <button onclick="openAdmin()" class="bg-slate-800 text-slate-400 px-4 rounded-2xl text-xl border border-slate-700">⚙️</button>
        </div>

            </div>

            <select id="new-type" class="w-full p-3 rounded-xl mb-2 border border-blue-200 bg-white">
                <option value="Business">Business Listing</option>
                <option value="Residential">Residential Listing</option>
            </select>
            <input id="new-category" type="text" placeholder="Category (e.g. Hardware, Contractor, Personal)" class="w-full p-3 rounded-xl mb-4 border border-blue-200">
            <button onclick="addListing()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Publish to Directory</button>

                    <div>

                        <p class="text-xs text-slate-500 mt-1">📍 ${item.address}</p>
                        <p class="text-xs font-semibold text-blue-600 uppercase tracking-wider mt-1">${item.category}</p>
                    </div>
                    <div class="flex items-center justify-between md:justify-end border-t pt-3 md:border-t-0 md:pt-0 border-slate-100">

                    </div>
                </div>
            `).join('');

            adminContainer.innerHTML = directory.map((item, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border text-sm">
                    <div><p class="font-bold">${item.name}</p><p class="text-xs text-slate-400">${item.phone}</p></div>
                    <button onclick="deleteListing(${idx})" class="text-red-500 font-bold text-xs uppercase p-2">Remove</button>
                </div>
            `).join('');
        }

        function searchDirectory() {
            const query = document.getElementById('directory-search').value.toLowerCase();
            const cards = document.getElementById('listings-box').children;
            
            directory.forEach((item, index) => {
                const isMatch = item.name.toLowerCase().includes(query) || 
                                item.address.toLowerCase().includes(query) || 
                                item.category.toLowerCase().includes(query);
                if (cards[index]) {
                    if (isMatch) cards[index].classList.remove('hidden');
                    else cards[index].classList.add('hidden');
                }
            });
        }

        // Access Lock
        function openAdmin() {
            if (prompt("Enter Access Code:") === PASS) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('ad-input-title').value = adContent.title;
                document.getElementById('ad-input-sub').value = adContent.sub;
            } else {
                alert("Unauthorized");
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }

        function addListing() {
            const name = document.getElementById('new-name').value;
            const phone = document.getElementById('new-phone').value;
            const address = document.getElementById('new-address').value;
            const type = document.getElementById('new-type').value;
            const category = document.getElementById('new-category').value;

            if (name && phone) {
                directory.push({ name, phone, address, type, category });
                renderSite();
                document.getElementById('new-name').value = '';
                document.getElementById('new-phone').value = '';
                document.getElementById('new-address').value = '';
                document.getElementById('new-category').value = '';
            }
        }

        // Live Swapper
        function updateAd() {
            adContent.title = document.getElementById('ad-input-title').value;
            adContent.sub = document.getElementById('ad-input-sub').value;
            renderSite();
            alert("Live Advertisement Space Swapped!");
        }

        function deleteListing(idx) {
            if (confirm("Delete this listing permanently?")) {
                directory.splice(idx, 1);
                renderSite();
            }
        }

        renderSite();
