<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Business & Residential Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header class="bg-slate-900 text-white pt-10 pb-8 px-4 text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-3xl font-black tracking-tight uppercase">🌐 OPEN <span class="text-blue-400">DIRECTORY</span></h1>
        <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Universal Telephone & Business Index</p>
        
        <div class="max-w-md mx-auto mt-6 px-2">
            <input type="text" id="directory-search" placeholder="Search names, cities, or categories..." 
                   class="w-full p-4 rounded-2xl text-slate-900 font-medium shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <div class="bg-yellow-50 border-2 border-amber-300 rounded-3xl p-4 flex items-center justify-between shadow-sm">
            <div>
                <span class="bg-amber-400 text-slate-900 text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-wider">Sponsored</span>
                <h4 class="font-bold text-slate-900 mt-1">Your Business Name Here</h4>
                <p class="text-xs text-slate-600">Call 555-0100 to claim this prime advertising space today!</p>
            </div>
            <div class="text-right">
                <a href="tel:5550100" class="bg-slate-900 text-white text-xs font-bold px-4 py-3 rounded-xl inline-block uppercase">Call Now</a>
            </div>
        </div>

        <div id="listings-box" class="space-y-3">
            </div>

    </main>

    <script>
        // --- YOUR PLUG & PLAY DIRECTORY DATA ---
        const directoryData = [
            { name: "Ace Hardware", phone: "(405) 555-0199", address: "102 Main St, Pauls Valley, OK", type: "Business", category: "Hardware" },
            { name: "John Doe", phone: "(405) 555-0144", address: "404 Elm Ave, Wynnewood, OK", type: "Residential", category: "Personal" },
            { name: "Martin Services", phone: "(405) 238-0395", address: "Oklahoma", type: "Business", category: "Equipment & Supplies" }
        ];

        function displayDirectory() {
            const container = document.getElementById('listings-box');
            
            container.innerHTML = directoryData.map((item, index) => {
                // Inline Ad placement rule: inject an ad block after every 2nd listing
                let adBlock = '';
                if ((index + 1) % 2 === 0) {
                    adBlock = `
                        <div class="bg-slate-800 text-slate-300 rounded-2xl p-4 my-4 text-center border border-slate-700">
                            <span class="text-[9px] text-slate-500 uppercase tracking-widest font-bold block mb-1">Advertisement</span>
                            <p class="text-sm font-bold text-white">Local Services Directory Banner</p>
                            <p class="text-xs text-slate-400 mt-1">Target hundreds of local daily visitors. Spot available.</p>
                        </div>
                    `;
                }

                return `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-black text-xl text-slate-800 uppercase tracking-tight">${item.name}</h3>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded ${item.type === 'Business' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'}">${item.type}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1">📍 ${item.address}</p>
                            <p class="text-xs font-semibold text-blue-600 uppercase tracking-wider mt-1">${item.category}</p>
                        </div>
                        <div class="flex items-center justify-between md:justify-end border-t pt-3 md:border-t-0 md:pt-0 border-slate-100">
                            <span class="font-mono text-lg font-bold text-slate-900">${item.phone}</span>
                        </div>
                    </div>
                    ${adBlock}
                `;
            }).join('');
        }

        // Initialize the directory on page load
        displayDirectory();
    </script>
</body>
</html>
